{% if messages %}
<div id="sigep-message-modal" class="fixed inset-0 z-[999] flex items-center justify-center bg-slate-950/55 px-4">
  <div class="w-full max-w-md rounded-2xl bg-white shadow-2xl border border-slate-200 overflow-hidden">
    <div class="flex items-start justify-between gap-3 px-5 py-4 border-b border-slate-100">
      <div>
        <p class="text-xs font-semibold uppercase tracking-[0.22em] text-primary">SIGEP</p>
        <h3 class="mt-1 text-lg font-bold text-slate-900">
          {% for message in messages %}
            {% if forloop.first %}
              {% if 'error' in message.tags %}Ocurrió un error{% else %}Operación exitosa{% endif %}
            {% endif %}
          {% endfor %}
        </h3>
      </div>
      <button type="button" onclick="closeSigepModal()" class="inline-flex h-9 w-9 items-center justify-center rounded-full bg-slate-100 text-slate-500 hover:bg-slate-200">
        <span class="material-symbols-outlined text-[20px]">close</span>
      </button>
    </div>

    <div class="px-5 py-4 space-y-3">
      {% for message in messages %}
        <div class="rounded-xl px-4 py-3 text-sm border
          {% if 'error' in message.tags %}
            border-rose-200 bg-rose-50 text-rose-700
          {% else %}
            border-emerald-200 bg-emerald-50 text-emerald-700
          {% endif %}">
          {{ message }}
        </div>
      {% endfor %}
    </div>

    <div class="px-5 py-4 bg-slate-50 flex justify-end">
      <button type="button" onclick="closeSigepModal()" class="inline-flex items-center justify-center rounded-xl bg-primary px-4 py-2.5 text-sm font-semibold text-white hover:bg-blue-600 transition">
        Entendido
      </button>
    </div>
  </div>
</div>

<script>
  function closeSigepModal() {
    const modal = document.getElementById("sigep-message-modal");
    if (modal) modal.remove();
  }
  document.addEventListener("keydown", function (event) {
    if (event.key === "Escape") closeSigepModal();
  });
</script>
{% endif %}
