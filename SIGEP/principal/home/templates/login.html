{% load static %}
<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>SIGEP 2024 - Portal de Resultados</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>

    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#1D82F5",
                        "background-light": "#F8FAFC",
                        "background-dark": "#0F172A",
                        "card-light": "#FFFFFF",
                        "card-dark": "#1E293B",
                    },
                    fontFamily: {
                        display: ["Inter", "sans-serif"],
                    },
                    borderRadius: {
                        DEFAULT: "0.75rem",
                    },
                },
            },
        };
    </script>
</head>

<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen transition-colors duration-300">

<header class="bg-card-light dark:bg-card-dark border-b border-slate-200 dark:border-slate-800 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 h-20 flex items-center justify-between">

        <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-primary rounded-xl flex items-center justify-center text-white">
                <span class="material-icons-outlined text-3xl">bar_chart</span>
            </div>
            <div>
                <h1 class="font-extrabold text-xl tracking-tight leading-none">Resultados en Vivo</h1>
                <p class="text-xs font-semibold text-slate-500 uppercase tracking-widest mt-1">
                    Congreso Internacional SIGEP 2024
                </p>
            </div>
        </div>

        <div class="flex items-center gap-8">
            <div class="text-center">
                <span class="block text-2xl font-black">07:50 p.m.</span>
                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Hora Local</span>
            </div>

            <div class="flex items-center gap-4">
                <a href="{% url 'principal:login' %}"
                   class="text-sm font-semibold hover:text-primary transition-colors">
                    Ingresar
                </a>

                <a href="{% url 'principal:registrar' %}"
                   class="bg-primary hover:bg-blue-600 text-white px-6 py-2.5 rounded-lg text-sm font-bold flex items-center gap-2 transition-all shadow-lg shadow-blue-500/20">
                    <span class="material-icons-outlined text-lg">person_add</span>
                    Registro
                </a>
            </div>
        </div>

    </div>
</header>

<main class="max-w-7xl mx-auto px-4 py-8">
    <!-- TODO: aquí después conectas datos dinámicos -->
</main>

<footer class="max-w-7xl mx-auto px-4 py-8 border-t border-slate-200 dark:border-slate-800 mt-12 mb-8">
    <div class="flex flex-col md:flex-row items-center justify-between gap-4 text-slate-400 text-xs font-medium uppercase tracking-widest">
        <p>© 2024 SIGEP - SISTEMA DE GESTIÓN DE PONENTES</p>
        <div class="flex gap-6">
            <a href="#" class="hover:text-primary">Términos</a>
            <a href="#" class="hover:text-primary">Privacidad</a>
            <a href="#" class="hover:text-primary">Soporte</a>
        </div>
    </div>
</footer>

<script>
    if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
        document.documentElement.classList.add('dark');
    }
</script>

</body>
</html>
