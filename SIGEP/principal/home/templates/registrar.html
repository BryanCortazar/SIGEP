{% load static %}
<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>SIGEP | Registro de Cuenta</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>

    <!-- Material Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        display: ["Public Sans", "sans-serif"]
                    }
                }
            }
        }
    </script>
</head>

<body class="font-display bg-background-light dark:bg-background-dark text-slate-900 dark:text-white antialiased h-screen overflow-hidden">

<div class="flex h-full w-full">

    <!-- LADO IZQUIERDO -->
    <div class="hidden lg:flex w-1/2 relative bg-slate-900 text-white p-12">
        <div class="absolute inset-0">
            <img src="{% static 'img/bg-registro.jpg' %}" class="w-full h-full object-cover opacity-60">
            <div class="absolute inset-0 bg-gradient-to-tr from-primary/90 to-blue-900/80"></div>
        </div>

        <div class="relative z-10 flex flex-col justify-between w-full">
            <h1 class="text-3xl font-bold">SIGEP</h1>

            <p class="text-lg max-w-md">
                Sistema Integral de Gestión de Eventos y Ponencias
            </p>

            <p class="text-sm">© 2024 Sistema Universitario</p>
        </div>
    </div>

    <!-- FORMULARIO -->
    <div class="flex w-full lg:w-1/2 items-center justify-center p-10 overflow-y-auto">

        <div class="w-full max-w-md space-y-6">

            <h2 class="text-3xl font-bold">Registro de cuenta</h2>
            <p class="text-slate-600 dark:text-slate-400">
                Complete el formulario para crear su perfil.
            </p>

            <!-- FORM DTL -->
            <form method="POST" action="{% url 'registrar' %}" class="space-y-4">
                {% csrf_token %}

                <div>
                    <label class="text-sm font-medium">Nombre completo</label>
                    <input name="fullname" required
                           class="w-full h-11 rounded-lg border-slate-300 dark:bg-slate-800"/>
                </div>

                <div>
                    <label class="text-sm font-medium">Correo electrónico</label>
                    <input type="email" name="email" required
                           class="w-full h-11 rounded-lg border-slate-300 dark:bg-slate-800"/>
                </div>

                <div>
                    <label class="text-sm font-medium">Tipo de usuario</label>
                    <select name="user_type" required
                            class="w-full h-11 rounded-lg border-slate-300 dark:bg-slate-800">
                        <option value="">Seleccione</option>
                        <option value="participante">Participante</option>
                        <option value="ponente">Ponente</option>
                        <option value="evaluador">Evaluador / Jurado</option>
                        <option value="coordinador">Coordinador</option>
                        <option value="administrador">Administrador</option>
                    </select>
                </div>

                <div>
                    <label class="text-sm font-medium">Contraseña</label>
                    <input type="password" name="password" required
                           class="w-full h-11 rounded-lg border-slate-300 dark:bg-slate-800"/>
                </div>

                <div>
                    <label class="text-sm font-medium">Confirmar contraseña</label>
                    <input type="password" name="confirm_password" required
                           class="w-full h-11 rounded-lg border-slate-300 dark:bg-slate-800"/>
                </div>

                <button type="submit"
                        class="w-full py-3 rounded-lg bg-primary text-white font-bold hover:bg-blue-600">
                    Registrar
                </button>

                <div class="text-center text-sm">
                    <a href="{% url 'login' %}" class="text-slate-500 hover:text-primary">
                        Cancelar
                    </a>
                </div>

            </form>

        </div>
    </div>
</div>

</body>
</html>
